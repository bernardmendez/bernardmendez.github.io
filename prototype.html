<head>
    <style>

        body {

            margin-right: auto;
        }
        
        #name {
            font-size: 25px;
            font-weight: normal;
        }
        
        
        #latest {
            display: flex;
            -webkit-flex-direction: row;
            justify-content: space-around;
        }
        
        .img {
            cursor: pointer;
        }

        
    </style>
</head>
<body>
    
    <div id='date'></div>
    
    <div id='top_bar'>
    
        <div id='name'>Bernard&nbspMendez</div>
    
        <div id='links'>
            <a href=''></a>
            <a href=''></a>
            <a href=''></a>
            <a href='about'>About</a>
            <a href='contact'>Contact</a>
        </div>
    
    </div>
    
    <div id='body'>

        <h1>Latest Publications</h1>
        
        <div id='latest'></div>
        
        
        <h1>About Bernard</h1>
        
        
        
        <h1>All Publications</h1>
        

    </div>


    <!-- Article information -->
    <script src="js/posts/db1-10.js"></script>
    <script src="js/posts/db11-20.js"></script>
    <script src="js/posts/db21-30.js"></script>
    <script>
        var temp;
        var entries = [homelesscorona, springbreak, onlineclasses, plos, coronabreaking2, wildcat, coronabreaking, debate, corona, genx, applications, kobe, recap, regents, walking, vicechancellor, pregnancy, shark, biden, trumpjr, aiethics, climatestrike, planet, internet, luskin, garg, catlady, autism, vaccine, snowpower, uganda, geneediting, rat, rocket];
    
        var entry = "<button class='article img' onclick='newtab(this.value)'><div class='description'><div class='title'>title</div><div class='author'>author</div><div class='summary'>summary</div></div><div class='img'></div></button>";
        
        function newtab(link) {
            window.open(link, '_blank')
        }

        var latest = document.getElementById('latest');
        for (i=0; i<3; i++) {
            temp = document.createElement('div');
            temp.innerHTML = entry;
            temp.getElementsByClassName('title')[0].innerHTML = '<span class="highlight">' + entries[i].title + '</span>';
            temp.getElementsByClassName('author')[0].innerHTML = 'By ' + entries[i].author;
            temp.getElementsByClassName('img')[0].style.backgroundImage = entries[i].image;
            temp.getElementsByClassName('article')[0].value = entries[i].url;
            temp.classList.add('article');
            latest.append(temp);
        }
        
    
    
        var date = new Date();

        var daynamelist = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        var monthlist = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        
        var daynumber = date.getDate();
        var dayname = date.getDay();
        var month = monthlist[date.getMonth()];
        var year = date.getFullYear();
        var fulldate = month + ' ' + daynumber + ', ' + year;

        document.getElementById('date').innerHTML = fulldate;

    </script>
</body>
