//[shark, biden, trumpjr, shark, biden, trumpjr, biden, climatestrike, uganda, internet, catlady, autism, rat, rocket, vaccine, snowpower, garg, planet];

var picture = document.getElementsByClassName('img');
var title = document.getElementsByClassName('title');
var articles = document.getElementsByClassName('article');
var author = document.getElementsByClassName('author');
var summary = document.getElementsByClassName('summary');

var spotlight = document.getElementById('spotlight');


var number = 0;



document.getElementById('header').innerHTML = header;
document.getElementById('date').innerHTML = fulldate;
document.getElementById('footer').innerHTML = footer;


var entries = document.getElementsByClassName('entry');

function fillentries() {
for (i=0; i<entries.length; i++) {
entries[i].innerHTML = entry;
}
}

var aroundtheweb = [graves, daytona, crispr, worsttech, quantum, anonymity, nanotube, leaders, senza, darkstar, nelson, chronograph, bus, accutron, baodai, whales, soviet, explorer, chronometer, wings, orleans];

var aroundentries = document.getElementsByClassName('atwentry');
var atwentries = document.getElementsByClassName('atw');

var aroundshown = [];
while (aroundshown.length < aroundentries.length) {
var x = Math.floor(Math.random() * aroundtheweb.length);
if (aroundshown.includes(x) === false) {
aroundshown.push(x);
}
}

function aroundformat() {
for (i=0; i<aroundentries.length; i++) {
aroundentries[i].innerHTML = atwentry;
setatwentry(atwentries[i], aroundshown[i]);
}
}

function aroundnew () {
var x = Math.floor(Math.random() * aroundtheweb.length);
if (aroundshown.includes(x) === false) {
var y = Math.floor(Math.random() * aroundshown.length);
setatwentry(atwentries[y], x);
aroundshown[y] = x;
}
}

function setatwentry(entry, ind) {
entry.getElementsByClassName('title')[0].innerHTML = aroundtheweb[ind].title;
entry.style.backgroundImage = aroundtheweb[ind].image;
entry.getElementsByClassName('author')[0].innerHTML = aroundtheweb[ind].author;
entry.getElementsByClassName('org')[0].innerHTML = aroundtheweb[ind].org;
entry.value = aroundtheweb[ind].link;
}

function setsection(section, sectionentries) {
for (i=0; i<section.length; i++) {
//title[i].innerHTML = '<span class="highlight">' + sectionentries[i].title + '</span>';
title[i].innerHTML = sectionentries[i].title;
author[i].innerHTML = 'By ' + sectionentries[i].author;
articles[i].value = sectionentries[i].url;
picture[i].style.backgroundImage = sectionentries[i].image;
summary[i].innerHTML = sectionentries[i].text;
}
}



aroundformat();
aroundnew();
setInterval(aroundnew, 3000);


fillentries();

setsection(entries, publications);
